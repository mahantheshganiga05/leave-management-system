{% if new_credentials %}
<div class="modal fade" id="newCredentialsModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h6 class="modal-title"><i class="bi bi-check-circle-fill me-1"></i> {{ new_credentials.role }} Account Created</h6>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-3">
          Save these login credentials now — <strong>this is the only time the password will be shown.</strong>
          If the email server isn't configured, {{ new_credentials.full_name }} will need these to log in.
        </p>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1">Username</label>
          <div class="input-group">
            <input type="text" class="form-control" id="credUsername" value="{{ new_credentials.username }}" readonly>
            <button class="btn btn-outline-secondary copy-cred-btn" type="button" data-target="credUsername">
              <i class="bi bi-clipboard"></i>
            </button>
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1">Temporary Password</label>
          <div class="input-group">
            <input type="text" class="form-control fw-bold" id="credPassword" value="{{ new_credentials.password }}" readonly>
            <button class="btn btn-outline-secondary copy-cred-btn" type="button" data-target="credPassword">
              <i class="bi bi-clipboard"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
          I've saved these credentials
        </button>
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const modalEl = document.getElementById('newCredentialsModal');
    if (modalEl) {
      const modal = new bootstrap.Modal(modalEl);
      modal.show();
    }
    document.querySelectorAll('.copy-cred-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const input = document.getElementById(btn.dataset.target);
        if (input) {
          navigator.clipboard.writeText(input.value).then(function () {
            const icon = btn.querySelector('i');
            icon.className = 'bi bi-check-lg text-success';
            setTimeout(function () { icon.className = 'bi bi-clipboard'; }, 1500);
          });
        }
      });
    });
  });
</script>
{% endif %}
