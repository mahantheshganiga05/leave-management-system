<div style="font-family: Arial, sans-serif; max-width: 500px; margin: auto;">
  <h2 style="color:#4f46e5;">Password Reset Request</h2>
  <p>Hi {{ user.full_name }},</p>
  <p>We received a request to reset your password. Click the button below to choose a new one. This link expires in 30 minutes.</p>
  <p style="text-align:center;">
    <a href="{{ reset_url }}" style="background:#4f46e5;color:#fff;padding:10px 24px;border-radius:6px;text-decoration:none;display:inline-block;">Reset Password</a>
  </p>
  <p>If you did not request this, you can safely ignore this email.</p>
  <p style="color:#888;font-size:12px;">Leave Management System</p>
</div>
